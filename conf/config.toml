# 可转债工具配置文件
# 格式：TOML（Tom's Obvious, Minimal Language）
# Python 3.11+ 内置 tomllib 支持，无需额外安装依赖
# 默认存放路径：../conf/config.toml（相对于项目根目录）

# ─────────────────────────────────────────
# 日志配置
# ─────────────────────────────────────────
[log]
# 日志文件存放目录（相对于项目根目录，或使用绝对路径）
dir = "../log"
# 单个日志文件最大大小（字节），超过后滚动；按天滚动时此项不生效
max_bytes = 10485760   # 10 MB
# 最多保留的历史日志文件个数
backup_count = 30
# 日志级别：DEBUG / INFO / WARNING / ERROR / CRITICAL
level = "INFO"

# ─────────────────────────────────────────
# 缓存配置
# ─────────────────────────────────────────
[cache]
# 本地文件缓存根目录（相对于项目根目录，或使用绝对路径）
dir = "../cache/bond"

# ─────────────────────────────────────────
# 导出配置
# ─────────────────────────────────────────
[export]
# 导出文件保存目录（相对于项目根目录，或使用绝对路径）
dir = "../exports"

# ─────────────────────────────────────────
# 数据库配置
# ─────────────────────────────────────────
[db]
# SQLite 数据库文件存放目录（相对于项目根目录，或使用绝对路径）
dir = "../data"

# ─────────────────────────────────────────
# 可转债业务配置
# ─────────────────────────────────────────
[bond]
# 后台补全线程每次请求之间的间隔时间（秒），避免频繁调用接口
fill_details_sleep = 0.2

# ─────────────────────────────────────────
# 网络配置
# ─────────────────────────────────────────
[network]
# 代理配置，支持三种模式：
#   ""                      → 不走代理，直连目标服务器（默认）
#   "system"                → 使用系统代理（HTTP_PROXY / HTTPS_PROXY 环境变量）
#   "http://127.0.0.1:7890" → 使用指定代理地址
proxy = ""
